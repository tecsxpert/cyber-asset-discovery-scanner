version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tool95-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-tool95}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: