services:
  postgres:
    image: postgres:15
    container_name: cyber-postgres
    environment:
      POSTGRES_DB: cyberdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cyber-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: cyber-backend
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cyberdb
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: mysecretkey123456789

  frontend:
    build: ./frontend
    container_name: cyber-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data: